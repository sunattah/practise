<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Student Management System</h1>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" onclick="showTab('all-students')">All Students</button>
            <button class="tab-btn" onclick="showTab('add-student')">Add Student</button>
            <button class="tab-btn" onclick="showTab('dashboard')">Student Dashboard</button>
        </nav>

        <!-- All Students Tab -->
        <div id="all-students" class="tab-content active">
            <h2>📚 All Students</h2>
            <div id="students-list"></div>
        </div>

        <!-- Add Student Tab -->
        <div id="add-student" class="tab-content">
            <h2>➕ Add New Student</h2>
            <form id="add-student-form">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Age:</label>
                    <input type="number" id="age" required>
                </div>
                <div class="form-group">
                    <label>Grade:</label>
                    <input type="text" id="grade" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Phone:</label>
                    <input type="tel" id="phone" required>
                </div>
                <button type="submit" class="btn btn-primary">Add Student</button>
            </form>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-content">
            <h2>📊 Student Dashboard</h2>
            <div class="form-group">
                <label>Enter Student ID:</label>
                <input type="number" id="dashboard-id">
                <button onclick="loadDashboard()" class="btn btn-primary">Load Dashboard</button>
            </div>
            <div id="dashboard-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
